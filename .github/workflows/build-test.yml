name: Build Test

permissions:
  contents: read

on: [push, pull_request]

jobs:
  build-debian-stable:
    name: Debian Stable
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Create Build Environment
      run: cd tests/ci/ && podman build -t appstream -f ./Dockerfile-debian-stable .

    - name: Build
      run: podman run -a stdout -a stderr -e COMPILER_VENDOR=$CVENDOR -e CC=gcc -e CXX=g++ -v `pwd`:/build appstream
           ./tests/ci/run-build.sh

    - name: Test
      run: podman run -a stdout -a stderr -e COMPILER_VENDOR=$CVENDOR -e CC=gcc -e CXX=g++ -v `pwd`:/build appstream
           ./tests/ci/run-tests.sh


  build-debian-testing:
    name: Debian Testing
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Create Build Environment
      run: cd tests/ci/ && podman build -t appstream -f ./Dockerfile-debian-testing .

    - name: Build
      run: podman run -a stdout -a stderr -e COMPILER_VENDOR=$CVENDOR -e CC=gcc -e CXX=g++ -v `pwd`:/build appstream
           ./tests/ci/run-build.sh

    - name: Test
      run: podman run -a stdout -a stderr -e COMPILER_VENDOR=$CVENDOR -e CC=gcc -e CXX=g++ -v `pwd`:/build appstream
           ./tests/ci/run-tests.sh


  build-fedora-latest:
    name: Fedora Latest Stable
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Create Build Environment
      run: cd tests/ci/ && podman build -t appstream -f ./Dockerfile-fedora-latest .

    - name: Build
      run: podman run -a stdout -a stderr -e COMPILER_VENDOR=$CVENDOR -e CC=gcc -e CXX=g++ -v `pwd`:/build appstream
           ./tests/ci/run-build.sh

    - name: Test
      run: podman run -a stdout -a stderr -e COMPILER_VENDOR=$CVENDOR -e CC=gcc -e CXX=g++ -v `pwd`:/build appstream
           ./tests/ci/run-tests.sh


  build-fedora-rawhide:
    name: Fedora Rawhide
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Create Build Environment
      run: cd tests/ci/ && podman build -t appstream -f ./Dockerfile-fedora-rawhide .

    - name: Build
      continue-on-error: true  # with a Git snapshot of GCC, this build is exceptionally flaky
      run: podman run -a stdout -a stderr -e COMPILER_VENDOR=$CVENDOR -e CC=gcc -e CXX=g++ -v `pwd`:/build appstream
           ./tests/ci/run-build.sh

    - name: Test
      continue-on-error: true  # with a Git snapshot of GCC, this build is exceptionally flaky
      run: podman run -a stdout -a stderr -e COMPILER_VENDOR=$CVENDOR -e CC=gcc -e CXX=g++ -v `pwd`:/build appstream
           ./tests/ci/run-tests.sh


  build-ubuntu:
    name: Ubuntu LTS
    runs-on: ubuntu-26.04
    steps:
    - uses: actions/checkout@v7

    - name: Create Build Environment
      run: sudo ./tests/ci/install-deps-deb.sh

    - name: Build
      run: CC=gcc CXX=g++ ./tests/ci/run-build.sh

    - name: Test
      run: CC=gcc CXX=g++ ./tests/ci/run-tests.sh


  build-sanitized-debian:
    name: Sanitizers on Debian
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Create Build Environment
      run: cd tests/ci/ && podman build -t appstream -f ./Dockerfile-debian-testing .

    - name: Build with asan, ubsan
      run: podman run -a stdout -a stderr --privileged -e COMPILER_VENDOR=$CVENDOR -e CC=gcc -e CXX=g++ -v `pwd`:/build appstream
           ./tests/ci/run-build.sh sanitize

    - name: Test with asan, ubsan
      run: podman run -a stdout -a stderr --privileged -e COMPILER_VENDOR=$CVENDOR -e CC=gcc -e CXX=g++ -v `pwd`:/build appstream
           ./tests/ci/run-tests.sh sanitize


  build-sanitized-fedora:
    name: Sanitizers on Fedora
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Create Build Environment
      run: cd tests/ci/ && podman build -t appstream -f ./Dockerfile-fedora-latest .

    - name: Build with asan, ubsan
      run: podman run -a stdout -a stderr --privileged -e COMPILER_VENDOR=$CVENDOR -e CC=gcc -e CXX=g++ -v `pwd`:/build appstream
           ./tests/ci/run-build.sh sanitize

    - name: Test with asan, ubsan
      run: podman run -a stdout -a stderr --privileged -e COMPILER_VENDOR=$CVENDOR -e CC=gcc -e CXX=g++ -v `pwd`:/build appstream
           ./tests/ci/run-tests.sh sanitize

  build-freebsd:
    name: FreeBSD
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: cpa.sh {0}

    steps:
      - uses: actions/checkout@v7

      - name: Start VM
        uses: cross-platform-actions/action@5ea7e8e4677bd726033a10b094ba1c5762b15dee #v1.3.0
        with:
          operating_system: freebsd
          version: '15.1'

      - name: Run
        run: |
          # Use latest package set
          sudo mkdir -p /usr/local/etc/pkg/repos/
          sudo cp /etc/pkg/FreeBSD.conf /usr/local/etc/pkg/repos/FreeBSD.conf
          sudo sed -i.bak -e 's|/quarterly|/latest|' /usr/local/etc/pkg/repos/FreeBSD.conf

          echo "::group::Dependencies installation"
          sudo -E pkg install -y \
              docbook-xsl-ns gettext-tools glib gobject-introspection \
              gperf itstool libxmlb libfyaml meson pkgconf qt6-tools \
              snowballstemmer libblake3 textproc/py-gi-docgen vala
          echo "::endgroup::"

          export CC=/usr/bin/cc
          export CXX=/usr/bin/c++
          # /usr/ports/Mk/Uses/localbase.mk localbase:ldflags
          export LOCALBASE=/usr/local
          export CFLAGS="-isystem $LOCALBASE/include"
          export CPPFLAGS="$CFLAGS"
          export CXXFLAGS="$CFLAGS"
          export LDFLAGS="-L${LOCALBASE}/lib"

          echo "::group::Building"
          tests/ci/run-build.sh
          echo "::endgroup::"

          echo "::group::Testing"
          tests/ci/run-tests.sh
          echo "::endgroup::"
